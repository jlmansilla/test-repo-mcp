# Publica el build estático en la rama gh-pages (no usa la API de Pages de Actions).
# En el repo: Settings → Pages → Build and deployment → Source: Deploy from a branch
# Branch: gh-pages, folder: / (root)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: section9-dashboard/package-lock.json

      - name: Install and build
        working-directory: section9-dashboard
        run: |
          npm ci
          npm run build

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./section9-dashboard/dist
